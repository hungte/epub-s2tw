<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 簡轉繁工具 (無伺服器版)</title>

    <meta name="theme-color" content="#007bff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
                                   maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EPUB轉繁">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="apple-touch-icon" href="assets/icon-180.png">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <script type="text/javascript" src="js/app.js" defer></script>

    </script>
</head>

<body>
<div id="app-shroud" class="app-shroud hidden">
    <h1>EPUB 簡轉繁</h1>
<p>本程式無法在內置瀏覽器 (App Browser) 內執行。</p>
<p>請點擊右上角 <strong>...</strong> 按鈕</p>
<p>之後選擇「使用外部瀏覽器開啟」</p>
</div>

<div id="mainUI" class="card">
    <img src="assets/icon.png" width="80" height="80" style="border-radius: 15px; margin-bottom: 1rem;">
    <h1>EPUB 簡轉繁</h1>
    <p>免費無廣告，檔案僅在瀏覽器內處理不會上傳</p>
    <div id="status">正在初始化引擎...(初次需1-3分鐘)</div>
    <input type="file" id="fileInput" accept=".epub" class="hidden">
    <button class="btn" id="mainBtn" disabled>請稍候</button>
    <div class="conversion-panel">
        <div class="select-group">
            <label for="src-lang">來源語言</label>
            <select id="src-lang">
                <option value="s" selected>簡體中文 (Simplified)</option>
                <option value="t">繁體中文 (Traditional)</option>
                <option value="tw">台灣正體 (Taiwan)</option>
                <option value="hk">香港繁體 (Hong Kong)</option>
            </select>
        </div>
        <button id="swap-btn" type="button" title="交換方向">⇄</button>
        <div class="select-group">
            <label for="dest-lang">目標語言</label>
            <select id="dest-lang">
                <option value="t" selected>繁體中文 (Traditional)</option>
                <option value="tw">台灣正體 (Taiwan)</option>
                <option value="hk">香港繁體 (Hong Kong )</option>
                <option value="s">簡體中文 (Simplified)</option>
            </select>
        </div><br>
    </div>
    <div class="setting-item">
        <label for="chkV2H" class="setting-label">直書轉橫書</label>
        <div class="switch-wrapper">
            <input type="checkbox" id="chkV2H" class="switch-input"/>
            <label for="chkV2H" class="switch-slider"></label>
        </div>
    </div>
    <p class='copyright'>
     Created by: <a target='_blank' href="http://ntu.csie.org/~piaip/">Hung-Te Lin</a>.<br/>
     Source: github <a target='_blank' href="http://github.com/hungte/epub-s2tw/">hungte/epub-s2tw</a><span id="version">.</span>
    </p>
</div>

<div id="installGuide" class="installGuideOverlay hidden">
    <button class="close-btn" onclick="closeInstallGuide()">×</button>
    <div style='text-align: center;'>
    <button id="pwa-install-btn" class="install-button hidden">
        <span class="icon">➕</span>安裝以供離線使用
    </button>
    </div>
    <div id="iosGuide" class="iosGuide hidden">
      <h3>安裝至主畫面</h3>

      <div id="guide-safari" class="guide-step hidden">
        <p>1. 點擊下方的<strong>「…」或分享</strong>按鈕 <span class="icon-share"></span></p>
        <p>2. 向上捲動以選擇<strong>「加入主畫面」</strong></p>
      </div>

      <div id="guide-chrome" class="guide-step hidden">
        <p>1. 點擊上方網址列右側的<strong>分享</strong>按鈕 <span class="icon-share"></span></p>
        <p>2. 按下<strong>… 更多</strong>，向上捲動以選擇<strong>「加入主畫面」</strong></p>
      </div>

      <div class="guide-footer">
        <p>安裝後即可像 App 一樣離線使用</p>
      </div>
    </div>
</div>

</body>
</html>
