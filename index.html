<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 簡轉繁工具 (無伺服器版)</title>

    <meta name="theme-color" content="#007bff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
                                   maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EPUB轉繁">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="apple-touch-icon" href="assets/icon-180.png">

    <script type="text/javascript" src="js/app.js" defer></script>

    </script>
</head>

<body>
<div class="card">
    <img src="assets/icon.png" width="80" height="80" style="border-radius: 15px; margin-bottom: 1rem;">
    <h1>EPUB 簡轉繁</h1>
    <p>無伺服器，檔案僅在本地處理。</p>
    <div id="status">正在初始化引擎...(初次需1-3分鐘)</div>
    <input type="file" id="fileInput" accept=".epub" class="hidden">
    <button class="btn" id="mainBtn" disabled>請稍候</button>
    <p>
        <input type="checkbox" id="chkV2H"/><label for="chkV2H">直書轉橫書</label>
    </p>
    <p class='copyright'>
     Created by: <a href="mailto:hungte@gmail.com">Hung-Te Lin</a>.<br/>
     Source: github <a href="http://github.com/hungte/epub-s2tw/">hungte/epub-s2tw</a>.<br/>
    </p>
</div>

<div id="iosGuide" class="install-guide">
    <button id="pwa-install-btn" class="install-button hidden">
        <span class="icon">➕</span>安裝以供離線使用
    </button>
    <div style="font-weight: bold; margin-bottom: 5px;">💡 離線使用:</div>
    <div style="font-size: 0.85rem; line-height: 1.4;">
        1. 點擊瀏覽器選單 <b>(...)</b> 或 <b>分享按鈕</b><br>
        2. 選擇 <b>「加入主畫面」</b> (Add to Home Screen)
    </div>
</div>

</body>
</html>
