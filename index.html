<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB 簡轉繁工具 (無伺服器版)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .container { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; }
        #status { margin-top: 20px; color: #666; }
        progress { width: 100%; height: 20px; display: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .copyright { text-align: right; font-style: italic; }
    </style>
    <!-- Python script should not be executed by web pages. -->
    <script type='text/python' id='epub_s2tw'>

import zipfile
import io
import os
import re
import tempfile
from opencc import OpenCC

# Imported variables: epub_v2h, epub_bytes

CSS_PATTERN = re.compile(r'[-a-z]*writing-mode:\s*vertical-rl\s*;')
OPF_PATTERN = re.compile(r'page-progression-direction\s*=\s*"rtl"')
CONVERT_EXTS = ('.html', '.xhtml', '.opf', '.ncx', '.txt', '.css')
V2H = epub_v2h
print('V2H: ', V2H);


def convert_css(s):
    if not V2H:
        return s
    return CSS_PATTERN.sub('', s)


def convert(s, name):
    if name.endswith('.css'):
        return convert_css(s)
    if V2H and name.endswith('.opf'):
        s = OPF_PATTERN.sub('', s)
    return cc.convert(s)


def process():
    cc = OpenCC('s2t')
    input_data = epub_bytes.to_py()
    output_buffer = io.BytesIO()

    with zipfile.ZipFile(io.BytesIO(input_data), 'r') as zin:
        with zipfile.ZipFile(output_buffer, 'w', zipfile.ZIP_DEFLATED) as zout:
            for item in zin.infolist():
                content = zin.read(item.filename)
                if item.filename.endswith(CONVERT_EXTS):
                    try:
                        text = content.decode('utf-8')
                        converted = convert(text, item.filename)
                        zout.writestr(item.filename, converted.encode('utf-8'))
                        continue
                    except:
                        pass
                zout.writestr(item.filename, content)

    return output_buffer.getvalue()

process()
    </script>

    <!-- worker script that should not be executed when loading. -->
    <script id='worker_script' type='text/worker-script'>
        importScripts("https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js");

        let pyodide;
        async function initPyodide() {
            pyodide = await loadPyodide();
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            await micropip.install("opencc-python-reimplemented");
            self.postMessage({ type: 'READY' });
        }

        self.onmessage = async (e) => {
            if (e.data.type === 'CONVERT') {
                const { fileArrayBuffer, fileName, v2h, pythonCode } = e.data;

                try {
                    // 將 ArrayBuffer 轉為 Python 可讀的 bytes
                    self.postMessage({ type: 'STATUS', msg: 'Python 正在處理中...' });

                    pyodide.globals.set("epub_bytes", fileArrayBuffer);
                    pyodide.globals.set("epub_v2h", v2h);

                    const pyProxy = await pyodide.runPythonAsync(pythonCode);
                    const finalData = pyProxy.toJs();
                    pyProxy.destroy();
                    const outputBytes = new Blob([finalData], { type: 'application/epub+zip' });
                    self.postMessage({ type: 'DOWNLOAD', data: outputBytes, name: fileName.replace('.epub', '_繁體.epub') });
                } catch (err) {
                    self.postMessage({ type: 'ERROR', msg: err.toString() });
                }
            }
        };

        initPyodide();
    </script>
</head>

<body>
    <h2>EPUB 繁體轉換器</h2>
    <p>完全在瀏覽器本地端運作，檔案不會上傳至任何伺服器。不信可以按右鍵看網頁原始碼。</p>
    <p>第一次打開本頁要載入環境，大約一分鐘（看網路速度跟電腦速度）。
       請耐心等待按鈕變成藍色「開始轉換」。</p>

    <div class="container">
        <input type="file" id="fileInput" accept=".epub">
        <br><br>
        <button id="convertBtn" disabled>正在初始化 Python 環境...</button>
        <div id="status">準備中...</div>
        <progress id="progressBar" value="0" max="100"></progress>
        <br/>
        <input type="checkbox" id="chkV2H"/><label for="chkV2H">直書轉橫書</label>
    </div>
    <p class='copyright'>
     Created by: <a href="mailto:hungte@gmail.com">Hung-Te Lin</a> (2026),
     powered by Gemini and GitHub Pages.<br/>
     Source in <a href="http://github.com/hungte/epub-s2tw/">github:hungte/epub-s2tw</a>.
    </p>

    <script type='text/javascript'>
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');

        // 建立 Web Worker
        const worker = new Worker(URL.createObjectURL(new Blob([
            document.getElementById('worker_script').textContent],
            { type: 'text/javascript' })));

        worker.onmessage = (e) => {
            const { type, msg, data, name } = e.data;
            if (type === 'READY') {
                convertBtn.disabled = false;
                convertBtn.textContent = '開始轉換';
                status.textContent = '環境就緒，請選擇檔案';
            } else if (type === 'STATUS') {
                status.textContent = msg;
            } else if (type === 'DOWNLOAD') {
                const blob = new Blob([data], { type: 'application/epub+zip' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                status.textContent = '轉換完成！已自動下載。';
                progressBar.style.display = 'none';
                convertBtn.disabled = false;
            } else if (type === 'ERROR') {
                status.textContent = '錯誤: ' + msg;
                convertBtn.disabled = false;
            }
        };

        convertBtn.onclick = async () => {
            if (!fileInput.files[0]) return alert('請先選擇檔案');

            const file = fileInput.files[0];
            const reader = new FileReader();

            convertBtn.disabled = true;
            status.textContent = '讀取檔案中...';
            progressBar.style.display = 'block';

            reader.onload = (e) => {
                worker.postMessage({
                    type: 'CONVERT',
                    fileArrayBuffer: e.target.result,
                    fileName: file.name,
                    v2h: document.getElementById('chkV2H').checked,
                    pythonCode: document.getElementById('epub_s2tw').textContent,
                });
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
