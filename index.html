<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EPUB 簡轉繁工具 (無伺服器版)</title>

    <meta name="theme-color" content="#007bff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
                                   maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EPUB轉繁">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="apple-touch-icon" href="assets/icon-180.png">
    <link rel="icon" type="image/png" href="assets/icon-192.png">

    <script type="text/javascript" src="js/app.js" defer></script>

    </script>
</head>

<body>
<div class="card">
    <img src="assets/icon.png" width="80" height="80" style="border-radius: 15px; margin-bottom: 1rem;">
    <h1>EPUB 簡轉繁</h1>
    <p>無伺服器，檔案僅在本地處理。</p>
    <div id="status">正在初始化引擎...(初次需1-3分鐘)</div>
    <input type="file" id="fileInput" accept=".epub" class="hidden">
    <button class="btn" id="mainBtn" disabled>請稍候</button>
    <p>
        <input type="checkbox" id="chkV2H"/><label for="chkV2H">直書轉橫書</label>
    </p>
    <p class='copyright'>
     Created by: <a target='_blank' href="http://www.csie.ntu.edu.tw/~piaip/">Hung-Te Lin</a>.<br/>
     Source: github <a target='_blank' href="http://github.com/hungte/epub-s2tw/">hungte/epub-s2tw</a>.<br/>
    </p>
</div>

<div id="installGuide" class="installGuideOverlay hidden">
    <button class="close-btn" onclick="closeInstallGuide()">×</button>
    <div style='text-align: center;'>
    <button id="pwa-install-btn" class="install-button hidden">
        <span class="icon">➕</span>安裝以供離線使用
    </button>
    </div>
    <div id="iosGuide" class="iosGuide hidden">
      <h3>安裝至主畫面</h3>

      <div id="guide-safari" class="guide-step hidden">
        <p>1. 點擊下方的<strong>分享</strong>按鈕 <span class="icon-safari-share"></span></p>
        <p>2. 向上捲動並選擇<strong>「加入主畫面」</strong></p>
      </div>

      <div id="guide-chrome" class="guide-step hidden">
        <p>1. 點擊網址列右側的<strong>分享</strong>按鈕 <span class="icon-chrome-share"></span></p>
        <p>2. 選擇<strong>「加入主畫面」</strong></p>
      </div>

      <div class="guide-footer">
        <p>安裝後即可像 App 一樣離線使用</p>
      </div>
    </div>
</div>

</body>
</html>
